<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CVPro-facile — Version Premium</title>
  
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.4.15/vue.global.prod.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    :root {
      --bg-body: #f8fafc;
      --bg-panel: #ffffff;
      --primary: #2563eb;
      --border: #e2e8f0;
      --radius: 12px;
    }
    
    [data-theme="dark"] {
      --bg-body: #0f172a;
      --bg-panel: #1e293b;
      --border: #334155;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg-body); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
    
    /* Header */
    .app-header { height: 70px; background: var(--bg-panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; z-index: 100; }
    
    /* Layout */
    .main-container { display: flex; flex: 1; overflow: hidden; }
    
    /* Sidebar */
    .sidebar { width: 420px; background: var(--bg-panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; }
    .section-wrapper { padding: 20px; border-bottom: 1px solid var(--border); }
    
    /* PREVIEW AREA (CORRIGÉE) */
    .preview-area { 
      flex: 1; 
      background: #cbd5e1; 
      overflow: auto; /* Permet le scroll si le CV est grand */
      display: flex; 
      justify-content: center; 
      padding: 50px 20px;
      align-items: flex-start; /* Aligne en haut pour éviter de couper l'en-tête */
    }

    .cv-scale-wrapper {
      transform-origin: top center; /* Important pour que le haut reste visible */
      transition: transform 0.2s ease;
      box-shadow: 0 30px 60px rgba(0,0,0,0.2);
    }

    /* DOCUMENT A4 STRICT */
    .cv-document {
      width: 794px;
      min-height: 1123px; /* A4 */
      background: white;
      position: relative;
      color: #334155;
    }

    /* Template Corporate */
    .template-corporate .cv-header {
      width: 100%;
      background: var(--cv-color);
      color: white;
      padding: 40px;
      display: flex;
      align-items: center;
      gap: 30px;
    }
    .cv-photo { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 4px solid rgba(255,255,255,0.2); }
    
    .cv-body { display: flex; min-height: 900px; }
    .cv-sidebar { width: 35%; background: #f1f5f9; padding: 30px; }
    .cv-main { width: 65%; padding: 30px; }

    /* Forms */
    .form-group { margin-bottom: 15px; }
    label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 5px; color: #64748b; text-transform: uppercase; }
    input, textarea, select { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-body); color: inherit; }
    
    .btn { padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; border: none; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-outline { background: transparent; border: 1px solid var(--border); }
    .btn-paypal { background: #ffc439; color: #000; }

    .item-card { background: #f8fafc; border: 1px solid var(--border); padding: 15px; border-radius: 8px; margin-bottom: 10px; position: relative; }
    .remove-btn { position: absolute; top: 10px; right: 10px; color: #ef4444; cursor: pointer; }

    /* Utils */
    .section-title { font-weight: 800; text-transform: uppercase; color: var(--cv-color); border-bottom: 2px solid var(--cv-color); margin-bottom: 15px; padding-bottom: 5px; font-size: 14px; }
  </style>
</head>
<body>

<div id="app" style="display: contents;">
  <header class="app-header">
    <div style="font-weight: 800; font-size: 20px;"><i class="fa-solid fa-file-pdf text-primary"></i> CVPro</div>
    
    <div style="display: flex; gap: 10px;">
      <button class="btn btn-outline" @click="$refs.fileInput.click()">
        <i class="fa-solid fa-file-import"></i> Importer Données
      </button>
      <input type="file" ref="fileInput" style="display: none" @change="importJSON" accept=".json">

      <button class="btn btn-outline" @click="exportJSON"><i class="fa-solid fa-save"></i> Sauvegarder</button>
      
      <a href="https://paypal.me/toglanyaonestorpro" target="_blank" class="btn btn-paypal">
        <i class="fa-brands fa-paypal"></i> Soutenir
      </a>
      
      <button class="btn btn-primary" @click="exportPDF" :disabled="isExporting">
        <i class="fa-solid fa-download"></i> PDF
      </button>
    </div>
  </header>

  <div class="main-container">
    <aside class="sidebar">
      <div class="section-wrapper">
        <label>Informations Personnelles</label>
        <div class="form-group">
          <input type="file" @change="handlePhoto" accept="image/*">
        </div>
        <div style="display: flex; gap: 10px;">
          <input v-model="cv.personal.firstname" placeholder="Prénom">
          <input v-model="cv.personal.lastname" placeholder="Nom">
        </div>
        <input v-model="cv.personal.title" placeholder="Titre du poste" style="margin-top: 10px;">
        <textarea v-model="cv.personal.summary" placeholder="Résumé professionnel" rows="4" style="margin-top: 10px;"></textarea>
      </div>

      <div class="section-wrapper">
        <label>Expériences</label>
        <div v-for="(exp, idx) in cv.experience" :key="idx" class="item-card">
          <i class="fa-solid fa-trash remove-btn" @click="cv.experience.splice(idx, 1)"></i>
          <input v-model="exp.title" placeholder="Poste">
          <input v-model="exp.company" placeholder="Entreprise" style="margin-top: 5px;">
          <input v-model="exp.date" placeholder="Dates (ex: 2022 - Présent)" style="margin-top: 5px;">
        </div>
        <button class="btn btn-outline" style="width: 100%" @click="cv.experience.push({})">+ Ajouter</button>
      </div>

      <div class="section-wrapper">
        <label>Design & Couleurs</label>
        <input type="color" v-model="design.color" style="height: 40px; cursor: pointer;">
      </div>
    </aside>

    <main class="preview-area">
      <div class="cv-scale-wrapper" :style="{ transform: `scale(${zoomScale})` }">
        <div id="cv-preview" class="cv-document template-corporate" :style="{'--cv-color': design.color}">
          <div class="cv-header">
            <img :src="cv.personal.photo || 'https://via.placeholder.com/150'" class="cv-photo">
            <div>
              <h1 style="font-size: 32px; text-transform: uppercase;">{{ cv.personal.firstname }} {{ cv.personal.lastname }}</h1>
              <p style="font-size: 18px; opacity: 0.9;">{{ cv.personal.title }}</p>
            </div>
          </div>
          <div class="cv-body">
            <div class="cv-sidebar">
              <div class="section-title">Contact</div>
              <p v-if="cv.personal.email">{{ cv.personal.email }}</p>
              <p v-if="cv.personal.phone">{{ cv.personal.phone }}</p>
            </div>
            <div class="cv-main">
              <div class="section-title">Profil</div>
              <p style="margin-bottom: 25px; line-height: 1.6;">{{ cv.personal.summary }}</p>
              
              <div class="section-title">Expérience</div>
              <div v-for="exp in cv.experience" style="margin-bottom: 15px;">
                <div style="display: flex; justify-content: space-between; font-weight: 700;">
                  <span>{{ exp.title }}</span>
                  <span :style="{color: design.color}">{{ exp.date }}</span>
                </div>
                <div style="font-style: italic; font-size: 14px;">{{ exp.company }}</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<script>
const { createApp, ref, reactive, onMounted, watch } = Vue;

createApp({
  setup() {
    const isExporting = ref(false);
    const zoomScale = ref(0.75);
    const design = reactive({ color: '#2563eb' });
    
    const cv = reactive({
      personal: { firstname: '', lastname: '', title: '', summary: '', photo: '' },
      experience: [{ title: 'Développeur Web', company: 'Ma Super Entreprise', date: '2020 - 2024' }],
      education: [],
      skills: ''
    });

    // 1. IMPORT JSON (Correction de la demande)
    const importJSON = (event) => {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const data = JSON.parse(e.target.result);
          if (data.cv) {
            Object.assign(cv, data.cv);
            Object.assign(design, data.design || { color: '#2563eb' });
            alert("Données importées avec succès !");
          }
        } catch (err) {
          alert("Erreur lors de la lecture du fichier JSON.");
        }
      };
      reader.readAsText(file);
    };

    const exportJSON = () => {
      const dataStr = JSON.stringify({ cv, design });
      const blob = new Blob([dataStr], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = "mon_cv_data.json";
      a.click();
    };

    const handlePhoto = (e) => {
      const file = e.target.files[0];
      const reader = new FileReader();
      reader.onload = (ev) => { cv.personal.photo = ev.target.result; };
      reader.readAsDataURL(file);
    };

    const exportPDF = async () => {
      isExporting.value = true;
      const element = document.getElementById('cv-preview');
      
      // On utilise un scale de 2 pour la qualité mais on garde la taille A4
      const canvas = await html2canvas(element, {
        scale: 2,
        useCORS: true,
        logging: false,
        windowWidth: 794
      });
      
      const imgData = canvas.toDataURL('image/jpeg', 1.0);
      const pdf = new jspdf.jsPDF('p', 'mm', 'a4');
      pdf.addImage(imgData, 'JPEG', 0, 0, 210, 297);
      pdf.save("MonCV.pdf");
      isExporting.value = false;
    };

    // Ajustement automatique du Zoom pour éviter les coupures visuelles
    const updateZoom = () => {
      const area = document.querySelector('.preview-area');
      if (area) {
        const availableWidth = area.clientWidth - 100;
        zoomScale.value = Math.min(1, availableWidth / 794);
      }
    };

    onMounted(() => {
      window.addEventListener('resize', updateZoom);
      updateZoom();
    });

    return { 
      cv, design, zoomScale, isExporting, 
      handlePhoto, exportPDF, exportJSON, importJSON 
    };
  }
}).mount('#app');
</script>

</body>
</html>
