<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CVPro-facile Studio — Format Multi-pages A4</title>

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.4.15/vue.global.prod.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    /* VARIABLES INITIALES CONSERVÉES */
    :root {
      --bg-body: #f1f5f9; --bg-panel: #ffffff; --text-main: #0f172a;
      --border-color: #e2e8f0; --primary: #3b82f6; --radius: 8px;
    }
    [data-theme="dark"] { --bg-body: #0f172a; --bg-panel: #1e293b; --border-color: #334155; --text-main: #f8fafc; }

    body { font-family: 'DM Sans', sans-serif; background-color: var(--bg-body); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; margin: 0; }
    
    .app-header { height: 70px; display: flex; justify-content: space-between; align-items: center; padding: 0 24px; background: var(--bg-panel); border-bottom: 1px solid var(--border-color); z-index: 100; }
    .main-container { display: flex; flex: 1; overflow: hidden; }
    
    /* SIDEBAR */
    .sidebar { width: 400px; background: var(--bg-panel); border-right: 1px solid var(--border-color); overflow-y: auto; padding: 20px; }
    
    /* ZONE DE PRÉVISUALISATION CORRIGÉE */
    .preview-area { 
      flex: 1; 
      background-color: #cbd5e1; 
      overflow-y: auto; /* Permet de scroller si le CV est long */
      display: flex; 
      justify-content: center; 
      padding: 40px 0;
      align-items: flex-start;
    }

    /* CONTENEUR DE MISE À L'ÉCHELLE */
    .cv-scale-wrapper {
      transform-origin: top center;
      transition: transform 0.2s;
    }

    /* FORMAT A4 STRICT */
    .cv-document {
      width: 794px; /* Largeur A4 Standard */
      min-height: 1123px; /* Hauteur A4 Standard */
      height: auto; /* Grandit si le contenu déborde */
      background: white;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
    }

    /* STRUCTURE DU TEMPLATE (VOTRE DESIGN) */
    .cv-header { background: var(--cv-color); color: white; padding: 40px; display: flex; align-items: center; gap: 30px; }
    .cv-photo { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid rgba(255,255,255,0.5); }
    .cv-body { display: flex; flex: 1; }
    .cv-sidebar { width: 35%; background: #f8fafc; padding: 30px; border-right: 1px solid #eee; }
    .cv-main { width: 65%; padding: 30px; background: white; }

    /* FORMULAIRES */
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #64748b; }
    input, textarea { width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; background: var(--bg-body); color: inherit; }
    
    .btn { padding: 10px 20px; border-radius: 8px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; cursor: pointer; border: none; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-outline { background: transparent; border: 1px solid var(--border-color); color: var(--text-main); }
  </style>
</head>
<body>

  <div id="app" style="display: contents;">
    <header class="app-header">
      <div style="font-weight: 800; font-size: 1.2rem;"><i class="fa-solid fa-file-pdf"></i> CVPro Studio</div>
      <div style="display: flex; gap: 10px;">
        <button class="btn btn-outline" @click="$refs.importFile.click()"><i class="fa-solid fa-file-import"></i> Importer JSON</button>
        <input type="file" ref="importFile" @change="importJSON" style="display:none" accept=".json">
        
        <button class="btn btn-primary" @click="exportMultiPagePDF" :disabled="isExporting">
          <i class="fa-solid" :class="isExporting ? 'fa-spinner fa-spin' : 'fa-download'"></i> 
          {{ isExporting ? 'Génération...' : 'Télécharger PDF' }}
        </button>
      </div>
    </header>

    <div class="main-container">
      <aside class="sidebar">
        <div class="form-group">
          <label>Photo</label>
          <input type="file" @change="handlePhotoUpload" accept="image/*">
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
          <div class="form-group"><label>Prénom</label><input v-model="cv.personal.firstname"></div>
          <div class="form-group"><label>Nom</label><input v-model="cv.personal.lastname"></div>
        </div>
        <div class="form-group"><label>Poste</label><input v-model="cv.personal.title"></div>
        <div class="form-group"><label>Résumé</label><textarea rows="4" v-model="cv.personal.summary"></textarea></div>

        <h4 style="margin: 20px 0 10px;">Expériences</h4>
        <div v-for="(exp, i) in cv.experience" :key="i" style="background: #f8fafc; padding: 10px; margin-bottom: 10px; border-radius: 8px;">
          <input v-model="exp.title" placeholder="Poste" style="margin-bottom: 5px;">
          <input v-model="exp.company" placeholder="Entreprise">
          <button @click="cv.experience.splice(i, 1)" style="color: red; font-size: 11px; margin-top: 5px;">Supprimer</button>
        </div>
        <button class="btn btn-outline" style="width: 100%" @click="cv.experience.push({})">+ Ajouter expérience</button>
        
        <div class="form-group" style="margin-top: 20px;">
          <label>Couleur Thème</label>
          <input type="color" v-model="design.color">
        </div>
      </aside>

      <main class="preview-area">
        <div class="cv-scale-wrapper" :style="{ transform: `scale(${previewScale})` }">
          <div id="cv-preview" class="cv-document" :style="{ '--cv-color': design.color }">
            <div class="cv-header">
              <img v-if="cv.personal.photo" :src="cv.personal.photo" class="cv-photo">
              <div>
                <h1 style="font-size: 30px; text-transform: uppercase;">{{ cv.personal.firstname }} {{ cv.personal.lastname }}</h1>
                <p style="font-size: 18px; opacity: 0.9;">{{ cv.personal.title }}</p>
              </div>
            </div>
            <div class="cv-body">
              <div class="cv-sidebar">
                <h3 style="color: var(--cv-color); font-size: 14px; text-transform: uppercase; border-bottom: 2px solid; margin-bottom: 10px;">Contact</h3>
                <p style="font-size: 13px; margin-bottom: 5px;">{{ cv.personal.email }}</p>
                <p style="font-size: 13px;">{{ cv.personal.phone }}</p>
              </div>
              <div class="cv-main">
                <h3 style="color: var(--cv-color); font-size: 14px; text-transform: uppercase; border-bottom: 2px solid; margin-bottom: 15px;">Profil Professionnel</h3>
                <p style="font-size: 14px; line-height: 1.6; margin-bottom: 30px; white-space: pre-line;">{{ cv.personal.summary }}</p>
                
                <h3 style="color: var(--cv-color); font-size: 14px; text-transform: uppercase; border-bottom: 2px solid; margin-bottom: 15px;">Expériences</h3>
                <div v-for="exp in cv.experience" style="margin-bottom: 20px;">
                  <div style="font-weight: bold; font-size: 15px;">{{ exp.title }}</div>
                  <div style="font-style: italic; font-size: 13px; color: #666;">{{ exp.company }}</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script>
    const { createApp, ref, reactive, onMounted } = Vue;

    createApp({
      setup() {
        const isExporting = ref(false);
        const previewScale = ref(0.7);
        const design = reactive({ color: '#2563eb' });
        const cv = reactive({
          personal: { firstname: 'Nestor', lastname: 'Toglan', title: 'Développeur WordPress', summary: '', photo: '', email: '', phone: '' },
          experience: [{ title: 'Développeur Intégrateur', company: 'Nubet Paris' }]
        });

        // IMPORT JSON
        const importJSON = (event) => {
          const file = event.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (e) => {
            const data = JSON.parse(e.target.result);
            if (data.cv) Object.assign(cv, data.cv);
            if (data.design) Object.assign(design, data.design);
          };
          reader.readAsText(file);
        };

        const handlePhotoUpload = (e) => {
          const file = e.target.files[0];
          const reader = new FileReader();
          reader.onload = (ev) => { cv.personal.photo = ev.target.result; };
          reader.readAsDataURL(file);
        };

        // EXPORT MULTI-PAGES (Correction de votre demande)
        const exportMultiPagePDF = async () => {
          isExporting.value = true;
          const element = document.getElementById('cv-preview');
          
          // Capturer tout le contenu, même s'il est très long
          const canvas = await html2canvas(element, { scale: 2, useCORS: true });
          const imgData = canvas.toDataURL('image/jpeg', 0.95);
          
          const pdf = new jspdf.jsPDF('p', 'mm', 'a4');
          const pdfWidth = pdf.internal.pageSize.getWidth();
          const pdfHeight = pdf.internal.pageSize.getHeight();
          
          const canvasHeightInMm = (canvas.height * pdfWidth) / canvas.width;
          let heightLeft = canvasHeightInMm;
          let position = 0;

          // Page 1
          pdf.addImage(imgData, 'JPEG', 0, position, pdfWidth, canvasHeightInMm);
          heightLeft -= pdfHeight;

          // Si le contenu dépasse, on ajoute des pages automatiquement
          while (heightLeft >= 0) {
            position = heightLeft - canvasHeightInMm;
            pdf.addPage();
            pdf.addImage(imgData, 'JPEG', 0, position, pdfWidth, canvasHeightInMm);
            heightLeft -= pdfHeight;
          }

          pdf.save(`CV_${cv.personal.lastname}.pdf`);
          isExporting.value = false;
        };

        onMounted(() => {
          const adjustScale = () => {
            const area = document.querySelector('.preview-area');
            if (area) previewScale.value = Math.min(0.9, (area.clientWidth - 40) / 794);
          };
          window.addEventListener('resize', adjustScale);
          adjustScale();
        });

        return { cv, design, previewScale, isExporting, handlePhotoUpload, importJSON, exportMultiPagePDF };
      }
    }).mount('#app');
  </script>
</body>
</html>
